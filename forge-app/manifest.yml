modules:
  jira:projectPage:
    - key: brd-time-tracker-project-page
      resource: main
      resolver:
        function: resolver
      title: BRD & Time Tracker

  jira:issuePanel:
    - key: brd-time-tracker-issue-panel
      resource: main
      resolver:
        function: resolver
      title: Time Analytics
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg

  jira:adminPage:
    - key: brd-time-tracker-settings
      title: BRD & Time Tracker Settings
      resource: settings
      resolver:
        function: resolver

resources:
  - key: main
    path: static/main/build
  - key: settings
    path: static/settings/build

functions:
  - key: resolver
    handler: index.handler

app:
  id: ari:cloud:ecosystem::app/c8bab1dc-ae32-4e6f-9dbd-eb242cc6c14a
  runtime:
    name: nodejs20.x

permissions:
  scopes:
    - read:me
    - read:jira-work
    - write:jira-work
    - read:jira-user
    - storage:app
  external:
    fetch:
      backend:
        - address: "*.supabase.co"
