# SonarCloud Project Configuration

sonar.projectKey=Iswarya-Amzur_JIRAForge
sonar.organization=Iswarya-Amzur

# Project metadata
sonar.projectName=JIRAForge
sonar.projectVersion=1.0

# Source code directories
sonar.sources=ai-server/src,forge-app/src

# Test directories
sonar.tests=ai-server/tests

# Exclusions - don't analyze these
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,**/*.spec.js,**/coverage/**,**/venv/**,**/__pycache__/**

# JavaScript/TypeScript specific settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
